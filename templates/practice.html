<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#1a56db">
<title>{{ topic.label }} - GovtPrep</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1a56db;--green:#16a34a;--red:#dc2626;--amber:#d97706;
  --bg:#f8fafc;--white:#fff;--text:#0f172a;--dim:#64748b;--border:#e2e8f0}
body{background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  min-height:100vh;-webkit-tap-highlight-color:transparent}
.navbar{display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:52px;background:var(--white);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-left{font-size:.85rem;color:var(--blue);font-weight:700;text-decoration:none}
.nav-score{font-size:.95rem;font-weight:800;color:var(--text)}
.nav-pct{color:var(--blue);margin-left:6px;font-weight:800}
.timer-bar{background:var(--white);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:12px}
.timer-label{font-size:.8rem;font-weight:600;color:var(--dim);flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.timer-num{font-size:1.2rem;font-weight:800;min-width:30px;text-align:right}
.timer-track{flex:1;max-width:80px;height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.timer-fill{height:100%;border-radius:3px;transition:width .9s linear}
.main{padding:14px 16px 100px;display:flex;flex-direction:column;gap:12px;max-width:600px;margin:0 auto}
.q-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:18px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.q-num{font-size:.72rem;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.q-text{font-size:.95rem;font-weight:600;line-height:1.6;color:var(--text)}
.options{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:12px;background:var(--bg);
  border:2px solid var(--border);border-radius:12px;padding:14px;
  cursor:pointer;text-align:left;width:100%;
  -webkit-appearance:none;font-family:inherit}
.opt:active{opacity:.8}
.opt.selected{border-color:var(--blue);background:#eff6ff}
.opt.correct{border-color:var(--green);background:#f0fdf4}
.opt.wrong{border-color:var(--red);background:#fef2f2}
.opt-letter{font-size:.88rem;font-weight:800;color:var(--blue);min-width:18px;flex-shrink:0;margin-top:1px}
.opt.correct .opt-letter{color:var(--green)}
.opt.wrong .opt-letter{color:var(--red)}
.opt-text{font-size:.88rem;line-height:1.45;color:var(--text)}
.explanation{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px 16px;display:none;flex-direction:column;gap:8px}
.explanation.show{display:flex}
.exp-title{font-size:.72rem;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px}
.exp-text{font-size:.85rem;line-height:1.65;color:#0f172a}
.next-btn{background:var(--blue);color:#fff;border:none;border-radius:12px;
  padding:16px;font-size:.95rem;font-weight:700;cursor:pointer;width:100%;
  display:none;-webkit-appearance:none;font-family:inherit}
.next-btn.show{display:block}
.next-btn:active{background:#1648c0}
.loading-card{background:var(--white);border:1px solid var(--border);border-radius:14px;
  padding:32px 16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.88rem;color:var(--dim)}
.error-msg{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;
  padding:14px;font-size:.85rem;color:var(--red);text-align:center}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:none;align-items:flex-end;justify-content:center;z-index:200}
.overlay.show{display:flex}
.ov-card{background:var(--white);border-radius:20px 20px 0 0;
  padding:28px 20px 40px;width:100%;max-width:500px;
  display:flex;flex-direction:column;gap:12px}
.ov-title{font-size:1.1rem;font-weight:800}
.ov-score{font-size:2rem;font-weight:800}
.ov-rank{font-size:.9rem;font-weight:700;color:var(--blue)}
.ov-btn{display:block;text-align:center;padding:14px;border-radius:12px;
  font-size:.92rem;font-weight:700;border:none;cursor:pointer;width:100%;text-decoration:none;font-family:inherit}
.ov-btn-p{background:var(--blue);color:#fff}
.ov-btn-s{background:var(--bg);color:var(--text);border:1px solid var(--border)}
</style>
</head>
<body>

<nav class="navbar">
  <a href="/exam/{{ exam.id }}" class="nav-left">← {{ exam.label }}</a>
  <div class="nav-score">
    <span id="correct">0</span>/<span id="total">0</span>
    <span class="nav-pct" id="pct"></span>
  </div>
</nav>

<div class="timer-bar">
  <div class="timer-label">{{ topic.label }}</div>
  <div class="timer-num" id="timerNum">60</div>
  <div class="timer-track">
    <div class="timer-fill" id="timerFill" style="width:100%;background:var(--blue)"></div>
  </div>
</div>

<div class="main">

  <div id="statusArea"></div>

  <div class="loading-card" id="loadingCard">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Loading your question...</div>
  </div>

  <div id="questionWrap" style="display:none;flex-direction:column;gap:12px">
    <div class="q-card">
      <div class="q-num" id="qNum">Question 1</div>
      <div class="q-text" id="qText"></div>
    </div>
    <div class="options" id="optionsWrap"></div>
    <div class="explanation" id="explanation">
      <div class="exp-title">Explanation</div>
      <div class="exp-text" id="expText"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
  </div>

</div>

<div class="overlay" id="overlay">
  <div class="ov-card">
    <div class="ov-title">Session complete</div>
    <div class="ov-score" id="ovScore"></div>
    <div class="ov-rank" id="ovRank"></div>
    <button class="ov-btn ov-btn-p" onclick="location.reload()">Practice again</button>
    <a href="/exam/{{ exam.id }}" class="ov-btn ov-btn-s">Back to topics</a>
  </div>
</div>

<script>
const EXAM_ID    = "{{ exam.id }}";
const SUBJECT_ID = "{{ subject.id }}";
const TOPIC_ID   = "{{ topic.id }}";
const TOTAL_QS   = 10;

let sessionId    = null;
let questions    = [];
let currentIdx   = 0;
let correctCount = 0;
let totalCount   = 0;
let answered     = false;
let timerInterval= null;
let timeLeft     = 60;
let questionStart= null;
let excludeIds   = [];

window.addEventListener('load', init);

async function init() {
  // Start session first
  try {
    const sr = await fetch('/api/session/start', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        exam_id: EXAM_ID,
        subject_id: SUBJECT_ID,
        topic_id: TOPIC_ID,
        mode: 'practice'
      })
    });
    const sd = await sr.json();
    if (sd.error) {
      showError(sd.error === 'daily_limit'
        ? 'Daily limit reached. <a href="/pricing">Upgrade for more time</a>.'
        : sd.error);
      return;
    }
    sessionId = sd.session_id;
  } catch(e) {
    showError('Could not connect. Please refresh.');
    return;
  }
  loadQuestions();
}

async function loadQuestions() {
  document.getElementById('loadingCard').style.display = 'block';
  document.getElementById('questionWrap').style.display = 'none';

  try {
    const res  = await fetch('/api/questions/get', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        exam_id: EXAM_ID,
        subject_id: SUBJECT_ID,
        topic_id: TOPIC_ID,
        exclude_ids: excludeIds,
        count: TOTAL_QS
      })
    });
    const data = await res.json();

    if (data.error === 'daily_limit') {
      showError('Daily limit reached. <a href="/pricing">Upgrade</a>.');
      return;
    }
    if (data.generating) {
      document.getElementById('loadingText').textContent = 'Generating first questions for this topic... (~20 seconds)';
      setTimeout(loadQuestions, 4000);
      return;
    }
    if (!data.questions || data.questions.length === 0) {
      document.getElementById('loadingText').textContent = 'Preparing questions... please wait.';
      setTimeout(loadQuestions, 4000);
      return;
    }

    questions  = data.questions;
    currentIdx = 0;
    excludeIds = [...excludeIds, ...questions.map(q => q.id)];

    document.getElementById('loadingCard').style.display = 'none';
    document.getElementById('questionWrap').style.display = 'flex';
    showQuestion(0);

  } catch(e) {
    showError('Failed to load questions. <button onclick="loadQuestions()" style="color:var(--blue);background:none;border:none;cursor:pointer;font-size:inherit">Retry</button>');
  }
}

function showQuestion(idx) {
  answered = false;
  const q  = questions[idx];

  document.getElementById('qNum').textContent  = 'Question ' + (totalCount + 1);
  document.getElementById('qText').textContent = q.question || '';
  document.getElementById('explanation').className = 'explanation';
  document.getElementById('nextBtn').className     = 'next-btn';

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';

  ['A','B','C','D'].forEach(function(letter) {
    const text = q['option_' + letter.toLowerCase()] || '';
    const btn  = document.createElement('button');
    btn.className  = 'opt';
    btn.id         = 'opt' + letter;
    btn.innerHTML  = '<span class="opt-letter">' + letter + '</span>'
                   + '<span class="opt-text">' + esc(text) + '</span>';
    btn.addEventListener('click', function() { submitAnswer(letter); });
    wrap.appendChild(btn);
  });

  startTimer();
}

async function submitAnswer(letter) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  const timeSecs = questionStart ? Math.round((Date.now() - questionStart) / 1000) : 60;
  const q        = questions[currentIdx];

  // Mark selected immediately
  const selBtn = document.getElementById('opt' + letter);
  if (selBtn) selBtn.classList.add('selected');

  try {
    const res  = await fetch('/api/answer', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        question_id: q.id,
        user_answer: letter === 'TIMEOUT' ? 'X' : letter,
        session_id:  sessionId,
        time_secs:   timeSecs,
        exam_id:     EXAM_ID,
        subject_id:  SUBJECT_ID
      })
    });
    const data = await res.json();

    // Show correct/wrong colours
    const correct = data.correct_answer;
    const cBtn = document.getElementById('opt' + correct);
    if (cBtn) cBtn.classList.add('correct');
    if (letter !== correct && letter !== 'TIMEOUT') {
      const wBtn = document.getElementById('opt' + letter);
      if (wBtn) { wBtn.classList.remove('selected'); wBtn.classList.add('wrong'); }
    }

    // Update score
    totalCount++;
    if (data.is_correct) correctCount++;
    document.getElementById('correct').textContent = correctCount;
    document.getElementById('total').textContent   = totalCount;
    if (totalCount > 0) {
      document.getElementById('pct').textContent = Math.round(correctCount/totalCount*100) + '%';
    }

    // Show explanation
    if (data.explanation) {
      document.getElementById('expText').textContent = data.explanation;
      document.getElementById('explanation').className = 'explanation show';
    }

    // Complete or next
    if (totalCount >= TOTAL_QS) {
      setTimeout(completeSession, 1500);
    } else {
      document.getElementById('nextBtn').className = 'next-btn show';
    }

  } catch(e) {
    // Re-enable on error
    answered = false;
    ['A','B','C','D'].forEach(function(l) {
      const b = document.getElementById('opt'+l);
      if (b) { b.classList.remove('selected','correct','wrong'); }
    });
    document.getElementById('statusArea').innerHTML =
      '<div class="error-msg">Error submitting answer. Please try again.</div>';
    startTimer();
  }
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx < questions.length) {
    showQuestion(currentIdx);
  } else {
    loadQuestions();
  }
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft      = 60;
  questionStart = Date.now();
  updateTimer();
  timerInterval = setInterval(function() {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      submitAnswer('TIMEOUT');
    }
  }, 1000);
}

function updateTimer() {
  const el   = document.getElementById('timerNum');
  const fill = document.getElementById('timerFill');
  if (!el) return;
  el.textContent = timeLeft;
  fill.style.width = (timeLeft/60*100) + '%';
  const col = timeLeft > 20 ? '#1a56db' : timeLeft > 10 ? '#d97706' : '#dc2626';
  fill.style.background = col;
  el.style.color        = timeLeft > 20 ? '#0f172a' : col;
}

async function completeSession() {
  clearInterval(timerInterval);
  try {
    const res  = await fetch('/api/session/complete', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({session_id: sessionId, total_secs: totalCount * 30})
    });
    const data = await res.json();
    const pct  = totalCount ? Math.round(correctCount/totalCount*100) : 0;
    document.getElementById('ovScore').textContent = correctCount + '/' + totalCount + ' correct (' + pct + '%)';
    document.getElementById('ovRank').textContent  = data.rank ? 'Rank #' + data.rank : '';
    document.getElementById('overlay').className   = 'overlay show';
  } catch(e) {
    document.getElementById('ovScore').textContent = correctCount + '/' + totalCount + ' correct';
    document.getElementById('overlay').className   = 'overlay show';
  }
}

function showError(msg) {
  document.getElementById('loadingCard').style.display = 'none';
  document.getElementById('statusArea').innerHTML = '<div class="error-msg">' + msg + '</div>';
}

function esc(t) {
  return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
  </html>
